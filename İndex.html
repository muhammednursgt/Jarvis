<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Web Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Jarvis Ark Reaktörü Efekti */
        .arc-reactor {
            box-shadow: 0 0 30px 5px rgba(6, 182, 212, 0.7), inset 0 0 20px rgba(6, 182, 212, 0.5);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center font-sans overflow-hidden relative">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] z-0"></div>

    <div class="z-10 text-center flex flex-col items-center gap-8 max-w-lg px-4">
        <h1 class="text-4xl font-extrabold tracking-widest text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">JARVIS SYSTEM</h1>
        
        <button id="activateBtn" class="arc-reactor w-40 h-40 bg-slate-900 border-4 border-cyan-400 rounded-full flex items-center justify-center cursor-pointer transition-all duration-300 hover:border-cyan-300">
            <div class="w-28 h-28 border-2 border-dashed border-cyan-500 rounded-full animate-[spin_10s_linear_infinite] flex items-center justify-center">
                <div class="w-16 h-16 bg-cyan-500 rounded-full opacity-80 blur-[2px]"></div>
            </div>
        </button>

        <p id="statusText" class="text-slate-400 font-mono text-sm tracking-wide bg-slate-900/80 px-4 py-2 rounded-full border border-slate-800">
            Sistemi Başlatmak İçin Reaktöre Dokunun
        </p>

        <div class="w-full bg-slate-900/90 border border-slate-800 rounded-lg p-4 h-40 overflow-y-auto text-left font-mono text-xs text-cyan-300/80 shadow-2xl" id="consoleLog">
            [Sistem]: Çekirdek yüklenmeye hazır...
        </div>
    </div>

    <script>
        const activateBtn = document.getElementById('activateBtn');
        const statusText = document.getElementById('statusText');
        const consoleLog = document.getElementById('consoleLog');

        // Tarayıcı Ses Tanıma Desteği Kontrolü
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (!SpeechRecognition) {
            logToConsole("[HATA]: Tarayıcınız ses tanıma teknolojisini desteklemiyor. Lütfen Chrome kullanın.");
            statusText.innerText = "Desteklenmeyen Tarayıcı";
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true; // Arka planda sürekli dinleme sağlamak için en kritik ayar
            recognition.interimResults = false;
            recognition.lang = 'tr-TR';

            // Dinleme Süreçleri Kontrolü
            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "JARVIS AKTİF / DİNLİYOR...";
                statusText.classList.add('text-cyan-400');
                logToConsole("[SİSTEM]: Ses algılayıcıları aktif.");
            };

            recognition.onerror = (event) => {
                logToConsole(`[HATA]: Ses tanıma hatası (${event.error})`);
            };

            // Dinleme kesilirse (arka planda tarayıcı durdurursa) otomatik olarak geri başlatma tetikleyicisi
            recognition.onend = () => {
                if (isListening) {
                    logToConsole("[SİSTEM]: Arka plan bağlantısı yenileniyor...");
                    recognition.start();
                }
            };

            // Ses Komutlarının İşlendiği Yer
            recognition.onresult = (event) => {
                const currentResultIndex = event.resultIndex;
                const command = event.results[currentResultIndex][0].transcript.trim().toLowerCase();
                
                logToConsole(`[ALINDI]: "${command}"`);
                processCommand(command);
            };
        }

        // Butona Basınca Sistemi Başlatma/Durdurma
        activateBtn.addEventListener('click', () => {
            if (!recognition) return;

            if (!isListening) {
                recognition.start();
                speak("Sistemler çevrimiçi. Sizi dinliyorum efendim.");
            } else {
                isListening = false;
                recognition.stop();
                statusText.innerText = "Sistem Uyku Modunda";
                statusText.classList.remove('text-cyan-400');
                logToConsole("[SİSTEM]: Uyku moduna geçildi.");
            }
        });

        // Jarvis Yapay Zekâ Komut Mantığı
        function processCommand(cmd) {
            // "Jarvis" kelimesiyle tetiklenme veya direkt komut algılama
            if (cmd.includes("merhaba") || cmd.includes("selam")) {
                speak("Merhaba efendim. Bugün size nasıl yardımcı olabilirim?");
            } 
            else if (cmd.includes("saat kaç")) {
                const now = new Date();
                const timeStr = `Saat şu anda ${now.getHours()} ${now.getMinutes()}`;
                speak(timeStr);
            } 
            else if (cmd.includes("nasılsın")) {
                speak("Tüm sistemlerim maksimum verimlilikle çalışıyor efendim. İlginiz için teşekkürler.");
            }
            else if (cmd.includes("youtube'u aç") || cmd.includes("youtube aç")) {
                speak("YouTube açılıyor efendim.");
                window.open('https://youtube.com', '_blank');
            }
            else if (cmd.includes("kapat")) {
                speak("Sistemleri kapatıyorum.");
                isListening = false;
                recognition.stop();
                statusText.innerText = "Sistem Kapatıldı";
            }
            else {
                logToConsole(`[BİLİNMEYEN KOMUT]: Komut haritasında bulunamadı.`);
            }
        }

        // Jarvis Erkek Sesi Çıktı Motoru
        function speak(text) {
            if ('speechSynthesis' in window) {
                // Eğer halihazırda konuşuyorsa sustur
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                
                // Sistemdeki Erkek Sesini Bulma Filtresi
                const voices = window.speechSynthesis.getVoices();
                // Türkçe erkek sesleri genelde tarayıcıda isminde "Google" veya "Male" barındırır.
                // Eğer özel bir erkek sesi bulunamazsa varsayılan Türkçe sesi seçer.
                const maleVoice = voices.find(voice => voice.lang === 'tr-TR' && (voice.name.toLowerCase().includes('male') || voice.name.toLowerCase().includes('google')));
                
                if (maleVoice) {
                    utterance.voice = maleVoice;
                }

                // Jarvis Tonlaması İçin Ayarlar (Kalın ve net bir erkek sesi simülasyonu)
                utterance.pitch = 0.85; // Ses kalınlığı (0.5 ile 2 arası, düşük olan daha kalındır)
                utterance.rate = 1.0;  // Konuşma hızı

                logToConsole(`[JARVIS]: ${text}`);
                window.speechSynthesis.speak(utterance);
            } else {
                logToConsole("[HATA]: Ses sentezleyici desteklenmiyor.");
            }
        }

        // Konsol Günlüğü Fonksiyonu
        function logToConsole(message) {
            consoleLog.innerHTML += `<div>${message}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        // Tarayıcıların ses listesini asenkron yüklemesine karşılık ön hazırlık
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                logToConsole("[SİSTEM]: Ses motorları senkronize edildi.");
            };
        }
    </script>
</body>
</html>
