<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI</title>
<style>
  body { background: #000; color: #0ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  #visual { width: 200px; height: 200px; border: 2px solid #0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 10px #0ff; } 50% { box-shadow: 0 0 30px #0ff; } 100% { box-shadow: 0 0 10px #0ff; } }
</style>
</head>
<body>
  <div id="visual">JARVIS</div>
  <script>
    // Tarayıcıyı açtığında otomatik dinlemeye başlar
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.lang = 'tr-TR';

    recognition.onresult = (event) => {
      const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
      if (text.includes("jarvis")) {
        alert("Sizi dinliyorum komutanım!");
        // Buraya Gemini API isteğini ekleyerek Jarvis'i konuşturacağız
      }
    };
    recognition.start();
  </script>
</body>
</html>
